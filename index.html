<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pathfinding Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Pathfinding Visualizer</h1>

  <div class="controls">
    <select id="algo-select">
      <option value="dijkstra">Dijkstra's</option>
      <option value="astar">A* (Manhattan)</option>
      <option value="dfs">DFS</option>
    </select>

    <button id="run-btn">Visualize</button>
    <button class="btn-secondary" id="clear-path-btn">Clear Path</button>
    <button class="btn-danger" id="clear-btn">Clear All</button>
    <button class="btn-secondary" id="maze-btn">Generate Maze</button>

    <span class="speed-label">Speed:</span>
    <input type="range" id="speed" min="1" max="5" value="3">

    <span id="status">click Visualize to run</span>
  </div>

  <div class="legend">
    <div class="legend-item"><img src="assets/triangle-right.svg" style="width:14px;height:14px;"> Start</div>
    <div class="legend-item"><img src="assets/circle.svg" style="width:14px;height:14px;"> End</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--color-cell-wall)"></div> Wall</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--color-visited)"></div> Visited</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--color-path)"></div> Path</div>
  </div>
</header>

<div id="tip">💡 Tip: you can move the start and end nodes, and draw walls between them</div>

<div id="grid-container">
  <div id="grid"></div>
</div>

<script src="script.js"></script>
</body>
</html>
